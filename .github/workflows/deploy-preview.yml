name: Deploy preview to GitHub Pages

on:
  push:
    branches: [preview/gh-pages]
  # Fires when sync-preview merges i18n and pushes to preview/gh-pages.
  # The push above does not trigger this workflow on its own because it
  # comes from GITHUB_TOKEN inside another Action (anti-loop guard).
  workflow_run:
    workflows: ["Sync i18n into preview/gh-pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --config docusaurus.preview.config.ts

      - name: Emit glossary term JSON files for tooltip plugin
        run: node scripts/emit-term-json.mjs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
